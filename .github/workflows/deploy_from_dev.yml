name: Deploy from dev to main (PR only)

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - 'dev'
      - 'dev/*'

jobs:
  create-deploy-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify commit messages start with 'deploy' (case-insensitive)
        id: verify
        run: |
          event_file="${GITHUB_EVENT_PATH:-/github/workflow/event.json}"
          deploy_found=false

          if [ -f "$event_file" ] && command -v jq >/dev/null 2>&1; then
            if jq -r '.commits[].message' "$event_file" | grep -i -E -q '^deploy([[:space:][:punct:]]|$)'; then
              deploy_found=true
            fi
          else
            msg="${{ github.event.head_commit.message }}"
            if [ -n "$msg" ] && printf "%s" "$msg" | grep -i -E -q '^deploy([[:space:][:punct:]]|$)'; then
              deploy_found=true
            fi
          fi

          echo "deploy_found=$deploy_found" >> "$GITHUB_OUTPUT"
          if [ "$deploy_found" = "true" ]; then
            echo "Found commit starting with 'deploy'."
          else
            echo "No commit message starting with 'deploy' found in this push."
            exit 0
          fi
          
          echo "Found commit starting with 'deploy'. Proceeding."
          
      - name: Create PR from branch -> main (when push includes a 'deploy' commit)
        if: steps.verify.outputs.deploy_found == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const branch = context.ref.replace('refs/heads/','');
            const title = `Functionality Update | Deploy — ${branch}`;

            // Build a compact, plain-text list of commits from the push (SHA7, author, message)
            let body = `Automated PR: changes from ${branch}\n\n`;
            try {
              const event = context.payload;
              if (event && event.commits && event.commits.length > 0) {
                body += 'Push commits:\n';
                for (const c of event.commits) {
                  const sha7 = (c.id || '').slice(0,7);
                  const author = (c.author && (c.author.name || c.author.username)) || (c.commit && c.commit.author && c.commit.author.name) || '';
                  const msg = (c.message || '').replace(/\r?\n/g, ' \\n ');
                  body += `- ${sha7} ${author}: ${msg}\n`;
                }
              } else if (context.payload && context.payload.head_commit) {
                const hc = context.payload.head_commit;
                const sha7 = (context.payload.after || '').slice(0,7);
                const author = (hc.author && (hc.author.name || hc.author.username)) || '';
                const msg = (hc.message || '').replace(/\r?\n/g, ' \\n ');
                body += `Head commit: - ${sha7} ${author}: ${msg}\n`;
              }
            } catch (err) {
              // fallback: simple body
            }

            core.info(`Creating PR from ${branch} -> main`);
            let pr;
            try {
              pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: branch,
                base: 'main',
                body
              });
              core.info(`Created PR: ${pr.data.html_url}`);
            } catch (err) {
              core.info(`Failed to create PR: ${err.message}`);
              if (err.status === 422) {
                core.info('A pull request from this branch to main may already exist.');
              }
              throw err;
            }

            // Assign to the repository owner by default (override with PR_ASSIGNEE env var if needed)
            const assignee = process.env.PR_ASSIGNEE || context.repo.owner;
            const issue_number = pr.data.number;

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                assignees: [assignee]
              });
              core.info(`Assigned PR #${issue_number} to ${assignee}`);
            } catch (err) {
              core.info(`Could not assign PR #${issue_number} to ${assignee}: ${err.message}`);
              if (err.status === 422) core.info('User may not be assignable (not a collaborator or not allowed by repo settings).');
              // Do not fail the job on assignment errors
            }
